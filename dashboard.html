<div class="max-w-5xl mx-auto py-10 px-5">

```
<div class="flex justify-between items-center mb-8">
    <h1 class="text-3xl font-bold">
        Applicant Dashboard
    </h1>

    <button onclick="logout()"
        class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-lg">
        Logout
    </button>
</div>

<form id="profileForm" class="space-y-8">

    <div>
        <h2 class="text-xl font-bold mb-4">Personal Details</h2>

        <input id="name" placeholder="Full Name"
            class="w-full p-3 bg-zinc-900 rounded mb-3">

        <input id="phone" placeholder="Contact Number"
            class="w-full p-3 bg-zinc-900 rounded mb-3">

        <input id="email" readonly
            class="w-full p-3 bg-zinc-800 rounded">
    </div>

    <div>
        <h2 class="text-xl font-bold mb-4">About</h2>

        <textarea id="bio"
            class="w-full p-3 bg-zinc-900 rounded h-32"
            placeholder="Tell us about yourself"></textarea>
    </div>

    <div>
        <h2 class="text-xl font-bold mb-4">School</h2>

        <input id="school"
            placeholder="School Name"
            class="w-full p-3 bg-zinc-900 rounded mb-3">

        <input id="passingYear"
            placeholder="12th Passing Year"
            class="w-full p-3 bg-zinc-900 rounded">
    </div>

    <div>
        <h2 class="text-xl font-bold mb-4">College</h2>

        <input id="college"
            placeholder="College Name"
            class="w-full p-3 bg-zinc-900 rounded mb-3">

        <input id="degree"
            placeholder="Degree"
            class="w-full p-3 bg-zinc-900 rounded mb-3">

        <input id="branch"
            placeholder="Branch"
            class="w-full p-3 bg-zinc-900 rounded mb-3">

        <input id="collegeStart"
            placeholder="Start Year"
            class="w-full p-3 bg-zinc-900 rounded mb-3">

        <input id="collegeEnd"
            placeholder="End Year"
            class="w-full p-3 bg-zinc-900 rounded">
    </div>

    <div>
        <h2 class="text-xl font-bold mb-4">Links</h2>

        <input id="linkedin"
            placeholder="LinkedIn URL"
            class="w-full p-3 bg-zinc-900 rounded mb-3">

        <input id="github"
            placeholder="GitHub URL"
            class="w-full p-3 bg-zinc-900 rounded">
    </div>

    <div>
        <h2 class="text-xl font-bold mb-4">Skills</h2>

        <textarea id="skills"
            class="w-full p-3 bg-zinc-900 rounded h-32"
            placeholder="Python, Java, Firebase..."></textarea>
    </div>

    <div>
        <h2 class="text-xl font-bold mb-4">Project 1</h2>

        <input id="project1Name"
            placeholder="Project Name"
            class="w-full p-3 bg-zinc-900 rounded mb-3">

        <textarea id="project1Details"
            class="w-full p-3 bg-zinc-900 rounded h-24"></textarea>
    </div>

    <div>
        <h2 class="text-xl font-bold mb-4">Project 2</h2>

        <input id="project2Name"
            placeholder="Project Name"
            class="w-full p-3 bg-zinc-900 rounded mb-3">

        <textarea id="project2Details"
            class="w-full p-3 bg-zinc-900 rounded h-24"></textarea>
    </div>

    <div>
        <h2 class="text-xl font-bold mb-4">Project 3</h2>

        <input id="project3Name"
            placeholder="Project Name"
            class="w-full p-3 bg-zinc-900 rounded mb-3">

        <textarea id="project3Details"
            class="w-full p-3 bg-zinc-900 rounded h-24"></textarea>
    </div>

    <div class="flex gap-4">
        <button
            type="button"
            onclick="saveProfile()"
            class="bg-green-600 hover:bg-green-700 px-8 py-3 rounded-xl">
            Save Profile
        </button>

        <button
            type="button"
            onclick="generatePortfolio()"
            class="bg-purple-600 hover:bg-purple-700 px-8 py-3 rounded-xl">
            Generate AI Portfolio
        </button>
    </div>

    <div id="portfolioLink"></div>

</form>
```

</div>

<script src="js/dashboard.js"></script>

</body>
</html>
